name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check if release is needed
        id: check_release
        run: |
          set -euo pipefail

          VERSION=$(grep -oP "Version:\s*\K\d+(\.\d+)*" mollie-terminal-for-woocommerce.php)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          git fetch --prune --tags

          if ! git tag | grep -qx "v$VERSION"; then
            echo "Version has changed. Creating new release..."
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! gh release view "v$VERSION" --json assets --jq '.assets[].name' | grep -qx 'mollie-terminal-for-woocommerce.zip'; then
            echo "Release exists without ZIP asset. Rebuilding and uploading asset..."
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Version has not changed and ZIP asset already exists. Skipping release..."
          echo "release=false" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install composer dependencies
        if: steps.check_release.outputs.release == 'true'
        run: composer install --no-dev

      - name: Build ZIP
        if: steps.check_release.outputs.release == 'true'
        run: zip -r mollie-terminal-for-woocommerce.zip . -x "*.git*"

      - name: Create release and upload ZIP
        if: steps.check_release.outputs.release == 'true'
        run: |
          set -euo pipefail

          if gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release upload "v$VERSION" mollie-terminal-for-woocommerce.zip --clobber
          else
            gh release create "v$VERSION" \
              mollie-terminal-for-woocommerce.zip \
              --title "Release v$VERSION" \
              --notes "Release v$VERSION"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
